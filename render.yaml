services:
  - type: web
    name: pdf-receivable-parser
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: ppf_receivable
      - key: DATA_DIR
        value: /tmp
